<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/css/style.css" />
    <link rel="stylesheet" href="styles/css/normailze.css" />
    <title>Aqua med</title>
  </head>
  <body>
    <header>
      <div class="header__inner container">
        <div class="header__top">
          <div class="logo">
            <img src="#" alt="green logotype" />
            <h1>
              <span class="sitename">АкваМед</span>
              <span class="slogan">Клиника капельниц</span>
            </h1>
          </div>
          <div class="info">
            <ul class="info__list">
              <li class="info__item">
                <div class="adress">
                  <img src="#" alt="adress" />
                  <div class="adress__inner">
                    <span class="label">Адрес</span>
                    <a href="https://yandex.ru/maps/-/CPxonMiz" class="content"
                      >Санкт-Петербург, ул. Авиаконструкторов 45к1</a
                    >
                  </div>
                </div>
              </li>
              <li class="info__item">
                <div class="phone">
                  <img src="#" alt="phone" />
                  <div class="phone__inner">
                    <span class="label">Поддержка 24/7</span>
                    <a href="tel:+78008899999" class="content"
                      >+7 (800) 889-99-99</a
                    >
                  </div>
                </div>
              </li>
              <li class="info__item">
                <div class="schedule">
                  <img src="#" alt="schedule" />
                  <div class="schedule__inner">
                    <span class="label">Время работы</span>
                    <span class="content">Круглосуточно</span>
                  </div>
                </div>
              </li>
            </ul>
          </div>

          <div class="right-block">
            <button class="btn clean">
              <img src="#" alt="eye" />
            </button>
            <button class="btn secondary">
              <img src="#" alt="search" />
            </button>
            <div class="social">
              <ul class="social__list">
                <li class="social__item">
                  <a href="#" class="btn secondary">
                    <img src="#" alt="vk" />
                  </a>
                </li>
                <li class="social__item">
                  <a href="#" class="btn secondary">
                    <img src="#" alt="telegram" />
                  </a>
                </li>
                <li class="social__item">
                  <a href="#" class="btn secondary">
                    <img src="#" alt="ok" />
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>
        <div class="header__bottom">
          <nav class="nav">
            <ul class="nav__list">
              <li class="nav__item">
                <a href="#" class="btn secondary">Услуги</a>
              </li>
              <li class="nav__item">
                <a href="#" class="btn secondary">О клинике</a>
              </li>
              <li class="nav__item">
                <a href="#" class="btn secondary">Цены</a>
              </li>
              <li class="nav__item">
                <a href="#" class="btn secondary">Врачи</a>
              </li>
              <li class="nav__item">
                <a href="#" class="btn secondary">Контакты</a>
              </li>
              <li class="nav__item">
                <a href="#" class="btn secondary">Статьи</a>
              </li>
            </ul>
          </nav>
          <div class="actions">
            <button class="btn secondary">Записаться</button>
            <button class="btn primary">Капельница на дому</button>
          </div>
        </div>
      </div>
    </header>
    <main></main>
    <footer></footer>
  </body>

  <script defer src="scripts/script.js"></script>
</html>
